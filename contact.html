<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Buzzbite</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
.contact-layout { display: grid; grid-template-columns: 1fr 420px; gap: 64px; align-items: start; }
.contact-form { display: flex; flex-direction: column; gap: 18px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 7px; }
.form-group label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65); }
.form-group input, .form-group select, .form-group textarea { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 12px 16px; color: var(--white); font-family: 'Montserrat', sans-serif; font-size: 14px; transition: border-color 0.2s; outline: none; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--purple); }
.form-group select option { background: #1a1a2e; }
.contact-info-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 28px; margin-bottom: 20px; }
.contact-info-card h3, .contact-pathways h3 { font-size: 15px; font-weight: 700; margin-bottom: 20px; }
.contact-method { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.contact-method:last-child { margin-bottom: 0; }
.cm-icon { width: 38px; height: 38px; background: rgba(91,38,207,0.14); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.cm-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.35); margin-bottom: 2px; }
.cm-val { font-size: 14px; font-weight: 600; color: var(--purple-light); }
.contact-pathways { background: rgba(91,38,207,0.07); border: 1px solid rgba(91,38,207,0.18); border-radius: 16px; padding: 28px; }
.pathway-link { display: block; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.65); text-decoration: none; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); transition: color 0.2s; }
.pathway-link:last-child { border-bottom: none; }
.pathway-link:hover { color: var(--white); }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>



  <div id="footer-placeholder"></div>
  <script src="/components.js"></script>
</body>
</html>
