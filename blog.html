<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Buzzbite</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
  :root {
    --purple:#5B26CF;--purple-mid:#8D68DD;--purple-light:#BDA8EC;
    --purple-pale:#DED4F5;--orange:#F4522B;--yellow:#F0A830;
    --teal:#0A5E61;--green:#BCF3BC;--blue:#00CCFF;--red:#FF134E;
    --black:#0A0A0A;--white:#FFFFFF;--max-w:1280px;--px:48px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'Montserrat',sans-serif;background:var(--black);color:var(--white);overflow-x:hidden;}
  .container{max-width:var(--max-w);margin:0 auto;padding:0 var(--px);}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 0;background:rgba(10,10,10,0.88);backdrop-filter:blur(16px);border-bottom:1px solid rgba(91,38,207,0.18);}
  .nav-inner{max-width:var(--max-w);margin:0 auto;padding:0 var(--px);display:flex;align-items:center;justify-content:space-between;}
  .nav-links{display:flex;align-items:center;gap:28px;list-style:none;}
  .nav-links>li{position:relative;}
  .nav-links a{color:rgba(255,255,255,0.6);text-decoration:none;font-size:14px;font-weight:500;transition:color 0.2s;white-space:nowrap;}
  .nav-links a:hover,.nav-links a.active{color:var(--white);}
  .nav-cta{background:var(--purple)!important;color:var(--white)!important;padding:10px 22px!important;border-radius:6px;font-weight:600!important;}
  .nav-cta:hover{background:#6f35e8!important;}
  .nav-dropdown-trigger{cursor:pointer;display:flex;align-items:center;gap:5px;}
  .nav-dropdown-trigger svg{transition:transform 0.2s;}
  .nav-links>li.open .nav-dropdown-trigger svg{transform:rotate(180deg);}
  .nav-dropdown{visibility:hidden;opacity:0;pointer-events:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#13131f;border:1px solid rgba(91,38,207,0.25);border-radius:12px;padding:8px;min-width:220px;box-shadow:0 20px 40px rgba(0,0,0,0.5);transition:opacity 0.15s ease,visibility 0.15s ease;}
  .nav-dropdown::after{content:'';position:absolute;top:-16px;left:0;right:0;height:16px;}
  .nav-dropdown::before{content:'';position:absolute;top:-6px;left:50%;width:10px;height:10px;background:#13131f;border-left:1px solid rgba(91,38,207,0.25);border-top:1px solid rgba(91,38,207,0.25);transform:translateX(-50%) rotate(45deg);}
  .nav-links>li.open .nav-dropdown{visibility:visible;opacity:1;pointer-events:auto;}
  .nav-dropdown a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px!important;font-weight:500!important;color:rgba(255,255,255,0.65)!important;transition:background 0.15s,color 0.15s!important;}
  .nav-dropdown a:hover{background:rgba(91,38,207,0.15);color:var(--white)!important;}
  .nav-dropdown a .dd-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
  .nav-dropdown-divider{height:1px;background:rgba(255,255,255,0.06);margin:6px 4px;}
  footer{padding:64px 0 36px;border-top:1px solid rgba(255,255,255,0.07);}
  .footer-inner{max-width:var(--max-w);margin:0 auto;padding:0 var(--px);}
  .footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:60px;margin-bottom:56px;}
  .footer-brand p{font-size:13px;color:rgba(255,255,255,0.38);line-height:1.7;margin-top:14px;max-width:260px;}
  .footer-col h4{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:18px;}
  .footer-col ul{list-style:none;display:flex;flex-direction:column;gap:11px;}
  .footer-col a{font-size:14px;color:rgba(255,255,255,0.55);text-decoration:none;transition:color 0.2s;}
  .footer-col a:hover{color:var(--white);}
  .footer-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:24px;border-top:1px solid rgba(255,255,255,0.06);font-size:13px;color:rgba(255,255,255,0.28);}
  .section{padding:100px 0;}
  .section-inner{max-width:var(--max-w);margin:0 auto;padding:0 var(--px);}
  .section-tag{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--purple-light);margin-bottom:18px;display:flex;align-items:center;gap:10px;}
  .section-tag::before{content:'';display:block;width:24px;height:2px;background:var(--purple);border-radius:2px;}
  .section-title{font-size:clamp(34px,3.8vw,52px);font-weight:800;letter-spacing:-1.5px;line-height:1.1;margin-bottom:18px;}
  .section-subtitle{font-size:16px;color:rgba(255,255,255,0.52);line-height:1.75;max-width:560px;}
  .page-hero{padding:160px 0 80px;position:relative;overflow:hidden;}
  .page-hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 60% 40%,rgba(91,38,207,0.2) 0%,transparent 65%);}
  .page-hero-grid{position:absolute;inset:0;opacity:0.03;background-image:linear-gradient(rgba(255,255,255,0.6) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.6) 1px,transparent 1px);background-size:64px 64px;}
  .page-hero-inner{max-width:var(--max-w);margin:0 auto;padding:0 var(--px);position:relative;z-index:1;}
  .page-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(91,38,207,0.14);border:1px solid rgba(91,38,207,0.38);border-radius:100px;padding:7px 16px;font-size:11px;font-weight:700;color:var(--purple-light);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:24px;}
  .page-hero h1{font-size:clamp(42px,5vw,68px);font-weight:800;line-height:1.07;letter-spacing:-2px;margin-bottom:20px;}
  .page-hero p{font-size:18px;color:rgba(255,255,255,0.6);line-height:1.75;max-width:540px;margin-bottom:36px;}
  .page-hero-actions{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .btn-primary{background:var(--purple);color:var(--white);padding:15px 30px;border-radius:8px;font-size:15px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:transform 0.2s,box-shadow 0.2s,background 0.2s;}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(91,38,207,0.48);background:#6f35e8;}
  .btn-outline{border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);padding:14px 28px;border-radius:8px;font-size:15px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;}
  .btn-outline:hover{border-color:var(--purple);color:var(--white);}
  .btn-teal{background:var(--teal);color:var(--white);padding:15px 30px;border-radius:8px;font-size:15px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:transform 0.2s,box-shadow 0.2s;}
  .btn-teal:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(10,94,97,0.5);}
  .btn-white{background:var(--white);color:var(--purple);padding:15px 30px;border-radius:8px;font-size:15px;font-weight:700;text-decoration:none;transition:transform 0.2s,box-shadow 0.2s;white-space:nowrap;}
  .btn-white:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,0.2);}
  .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:32px;transition:transform 0.3s,border-color 0.3s;}
  .card:hover{transform:translateY(-4px);border-color:rgba(91,38,207,0.35);}
  .cta-band{margin:0 auto 100px;padding:0 var(--px);max-width:var(--max-w);}
  .cta-band-inner{background:var(--purple);border-radius:20px;padding:64px 72px;display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center;position:relative;overflow:hidden;}
  .cta-band-inner::before{content:'';position:absolute;top:-60px;right:-60px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,0.06);}
  .cta-band-inner h2{font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:8px;}
  .cta-band-inner p{font-size:15px;color:rgba(255,255,255,0.72);}
  .cta-band-actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0;position:relative;z-index:1;}
  .cta-note{font-size:12px;color:rgba(255,255,255,0.5);}
  .reveal{opacity:0;transform:translateY(24px);transition:opacity 0.6s ease,transform 0.6s ease;}
  .reveal.visible{opacity:1;transform:translateY(0);}
  /* ── MOBILE RESPONSIVE ───────────────────────────────────────────────── */
  @media (max-width: 768px) {
    :root { --px: 20px; }
    .nav-links { display: none; }
    .nav-cta { padding: 10px 16px; font-size: 13px; }
    .page-hero { padding: 100px 0 52px; }
    .page-hero-inner h1 { font-size: 32px; letter-spacing: -1px; }
    .page-hero-inner p { font-size: 14px; }
    .page-hero-actions { flex-direction: column; gap: 10px; }
    .page-hero-actions a { width: 100%; text-align: center; justify-content: center; }
    .section { padding: 56px 0; }
    .section-title { font-size: clamp(24px, 6vw, 36px); }
    .section-subtitle { font-size: 14px; }
    .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
    .footer-col:first-child { grid-column: 1 / -1; }
    .footer-bottom { flex-direction: column; gap: 12px; text-align: center; }
    .cta-band-inner { grid-template-columns: 1fr; padding: 40px 24px; }
    .cta-band-actions { align-items: flex-start; }
    .includes-grid,.dei-offerings,.ent-grid,.team-grid,.blog-grid,.perks-grid,.pricing-cols,.ao-tiers { grid-template-columns: 1fr; }
    .two-col-intro,.about-story,.managed-inner,.contact-layout { grid-template-columns: 1fr; gap: 40px; }
    .process-step { grid-template-columns: 48px 1fr; gap: 16px; }
    .ao-phases { grid-template-columns: 1fr; }
    .ao-phase-arrow { transform: rotate(90deg); text-align: center; }
    .cmp-head,.cmp-row { grid-template-columns: 1fr 36px 36px; gap: 8px; padding: 12px 16px; }
    .cmp-row span:first-child { font-size: 12px; }
    .price-row,.testi-row,.ent-quotes { grid-template-columns: 1fr; }
    .blog-featured { grid-template-columns: 1fr; gap: 28px; }
    .blog-featured-img { height: 180px; }
    .role-item { grid-template-columns: 1fr; gap: 12px; }
    .form-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 480px) {
    .section-title { font-size: 22px; }
    .footer-grid { grid-template-columns: 1fr; }
  }

  </style>
  <style>
    .blog-featured{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;margin-bottom:72px;padding-bottom:72px;border-bottom:1px solid rgba(255,255,255,0.07);}
    .blog-featured-img{border-radius:16px;height:320px;overflow:hidden;}
    .blog-featured-img img{width:100%;height:100%;object-fit:cover;}
    .blog-featured-img-placeholder{background:rgba(91,38,207,0.12);border:1px solid rgba(91,38,207,0.2);border-radius:16px;height:320px;display:flex;align-items:center;justify-content:center;font-size:80px;}
    .blog-cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--purple-light);margin-bottom:12px;}
    .blog-featured-content h2{font-size:28px;font-weight:800;letter-spacing:-0.5px;line-height:1.3;margin-bottom:14px;}
    .blog-featured-content p{font-size:15px;color:rgba(255,255,255,0.55);line-height:1.75;}
    .blog-meta{display:flex;gap:16px;font-size:12px;color:rgba(255,255,255,0.35);margin-top:14px;}
    .blog-filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:36px;}
    .blog-filter-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);padding:8px 20px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Montserrat',sans-serif;}
    .blog-filter-btn:hover{border-color:rgba(91,38,207,0.4);color:var(--white);}
    .blog-filter-btn.active{background:var(--purple);border-color:var(--purple);color:var(--white);}
    .blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
    .blog-card{border:1px solid rgba(255,255,255,0.07);border-radius:14px;transition:border-color 0.2s,transform 0.2s;overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;}
    .blog-card:hover{border-color:rgba(91,38,207,0.35);transform:translateY(-3px);}
    .blog-card-thumb{width:100%;height:180px;object-fit:cover;display:block;}
    .blog-card-body{padding:24px 28px 28px;}
    .blog-card h3{font-size:15px;font-weight:700;line-height:1.45;margin:8px 0 12px;color:var(--white);}
    .blog-link{font-size:13px;font-weight:700;color:var(--purple-light);text-decoration:none;}
    .blog-link:hover{color:var(--white);}
    .blog-loading{text-align:center;padding:60px 0;color:rgba(255,255,255,0.4);font-size:15px;}
    .blog-pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:48px;flex-wrap:wrap;}
    .blog-page-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);width:40px;height:40px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Montserrat',sans-serif;display:flex;align-items:center;justify-content:center;}
    .blog-page-btn:hover{border-color:rgba(91,38,207,0.4);color:var(--white);}
    .blog-page-btn.active{background:var(--purple);border-color:var(--purple);color:var(--white);}
    .blog-page-btn:disabled{opacity:0.3;cursor:default;pointer-events:none;}
    .blog-page-btn.nav-btn{width:auto;padding:0 16px;gap:6px;}
    .blog-page-dots{color:rgba(255,255,255,0.3);font-size:14px;padding:0 4px;}
    .blog-post-count{text-align:center;margin-top:16px;font-size:13px;color:rgba(255,255,255,0.3);}
  </style>
  <link rel="stylesheet" href="/responsive.css?v=3">
</head>
<body>
<div id="nav-placeholder"></div>

<section class="page-hero">
  <div class="page-hero-bg"></div><div class="page-hero-grid"></div>
  <div class="page-hero-inner">
    <div class="page-badge">Insights</div>
    <h1>The Buzzbite Blog.</h1>
    <p>Research, opinion, and practical guides on DTC creator marketing, nano and micro-creator strategy, revenue attribution, and building equitable creator programmes — for brand marketers who want to do it right.</p>
  </div>
</section>

<section class="section">
  <div class="section-inner">
    <div id="blog-featured" class="reveal"></div>
    <div id="blog-filters" class="blog-filters"></div>
    <div id="blog-grid" class="blog-grid reveal"></div>
    <div id="blog-pagination" class="blog-pagination"></div>
    <div id="blog-post-count" class="blog-post-count"></div>
    <div id="blog-loading" class="blog-loading">Loading articles...</div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script>
(async function() {
  var loadingEl = document.getElementById('blog-loading');
  var res;
  var posts;
  try {
    res = await fetch('/blog/posts.json');
    posts = await res.json();
  } catch (err) {
    loadingEl.textContent = 'Unable to load articles. Please try refreshing the page.';
    return;
  }

  loadingEl.style.display = 'none';

  const featuredPosts = posts.filter(function(p) { return p.featured; });
  featuredPosts.sort(function(a, b) {
    return new Date(b.postedOn || b.publishedOn || b.createdOn || 0) - new Date(a.postedOn || a.publishedOn || a.createdOn || 0);
  });
  const featuredPost = featuredPosts[0] || posts[0];
  const featuredEl = document.getElementById('blog-featured');

  function formatDate(post) {
    const d = new Date(post.postedOn || post.publishedOn || post.createdOn);
    if (isNaN(d)) return '';
    return d.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
  }

  if (featuredPost) {
    const imgHTML = featuredPost.thumbnailImage
      ? '<div class="blog-featured-img"><img src="' + featuredPost.thumbnailImage + '" alt="' + featuredPost.title.replace(/"/g, '&quot;') + '"></div>'
      : '<div class="blog-featured-img-placeholder">&#128202;</div>';

    const subHTML = featuredPost.subheading
      ? '<p>' + featuredPost.subheading + '</p>'
      : '';

    featuredEl.innerHTML =
      imgHTML +
      '<div class="blog-featured-content">' +
        '<div class="blog-cat">' + (featuredPost.category || 'Blog') + '</div>' +
        '<h2>' + featuredPost.title + '</h2>' +
        subHTML +
        '<div class="blog-meta"><span>' + formatDate(featuredPost) + '</span><span>' + (featuredPost.readingTime || '') + ' read</span></div>' +
        '<a href="/blog-post.html#' + featuredPost.slug + '" class="blog-link" style="display:inline-block;margin-top:16px;">Read article &rarr;</a>' +
      '</div>';
    featuredEl.classList.add('blog-featured');
  }

  const categories = [...new Set(posts.map(p => p.category).filter(Boolean))].sort();
  const filtersEl = document.getElementById('blog-filters');
  filtersEl.innerHTML = '<button class="blog-filter-btn active" data-cat="all">All</button>' +
    categories.map(c => '<button class="blog-filter-btn" data-cat="' + c + '">' + c + '</button>').join('');

  var gridEl = document.getElementById('blog-grid');
  var paginationEl = document.getElementById('blog-pagination');
  var postCountEl = document.getElementById('blog-post-count');
  var otherPosts = posts.filter(function(p) { return p !== featuredPost; });
  var POSTS_PER_PAGE = 9;
  var currentPage = 1;
  var currentFilter = 'all';

  function getFiltered(filterCat) {
    return filterCat === 'all' ? otherPosts : otherPosts.filter(function(p) { return p.category === filterCat; });
  }

  function renderCard(p) {
    var thumbHTML = p.thumbnailImage
      ? '<img class="blog-card-thumb" src="' + p.thumbnailImage + '" alt="' + p.title.replace(/"/g, '&quot;') + '">'
      : '';
    return '<a href="/blog-post.html#' + p.slug + '" class="blog-card">' +
      thumbHTML +
      '<div class="blog-card-body">' +
        '<div class="blog-cat">' + (p.category || 'Blog') + '</div>' +
        '<h3>' + p.title + '</h3>' +
        '<div class="blog-meta"><span>' + formatDate(p) + '</span><span>' + (p.readingTime || '') + ' read</span></div>' +
      '</div>' +
    '</a>';
  }

  function renderPagination(totalPosts, page) {
    var totalPages = Math.ceil(totalPosts / POSTS_PER_PAGE);
    if (totalPages <= 1) {
      paginationEl.innerHTML = '';
      postCountEl.innerHTML = '';
      return;
    }

    var html = '';
    html += '<button class="blog-page-btn nav-btn" data-page="' + (page - 1) + '"' + (page === 1 ? ' disabled' : '') + '>&larr; Prev</button>';

    for (var i = 1; i <= totalPages; i++) {
      if (totalPages > 7 && i > 2 && i < totalPages - 1 && Math.abs(i - page) > 1) {
        if (i === 3 || i === totalPages - 2) {
          html += '<span class="blog-page-dots">&hellip;</span>';
        }
        continue;
      }
      html += '<button class="blog-page-btn' + (i === page ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>';
    }

    html += '<button class="blog-page-btn nav-btn" data-page="' + (page + 1) + '"' + (page === totalPages ? ' disabled' : '') + '>Next &rarr;</button>';

    paginationEl.innerHTML = html;

    var start = (page - 1) * POSTS_PER_PAGE + 1;
    var end = Math.min(page * POSTS_PER_PAGE, totalPosts);
    postCountEl.textContent = 'Showing ' + start + '–' + end + ' of ' + totalPosts + ' articles';
  }

  function renderGrid(filterCat, page) {
    var filtered = getFiltered(filterCat);
    var totalPages = Math.ceil(filtered.length / POSTS_PER_PAGE);
    if (page > totalPages) page = totalPages || 1;
    var start = (page - 1) * POSTS_PER_PAGE;
    var pageItems = filtered.slice(start, start + POSTS_PER_PAGE);

    gridEl.innerHTML = pageItems.map(renderCard).join('');
    renderPagination(filtered.length, page);
    currentPage = page;
    currentFilter = filterCat;
  }

  renderGrid('all', 1);

  filtersEl.addEventListener('click', function(e) {
    var btn = e.target.closest('.blog-filter-btn');
    if (!btn) return;
    filtersEl.querySelectorAll('.blog-filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderGrid(btn.dataset.cat, 1);
    gridEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  paginationEl.addEventListener('click', function(e) {
    var btn = e.target.closest('.blog-page-btn');
    if (!btn || btn.disabled) return;
    var page = parseInt(btn.dataset.page);
    if (isNaN(page) || page < 1) return;
    renderGrid(currentFilter, page);
    gridEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  var obs = new IntersectionObserver(function(e) { e.forEach(function(i) { if (i.isIntersecting) i.target.classList.add('visible'); }); }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(function(el) { obs.observe(el); });
})();
</script>
<script src="/components.js" defer></script>
</body>
</html>
